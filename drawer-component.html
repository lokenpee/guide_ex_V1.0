<div id="revt-wrapper" class="inline-drawer">
  <div class="inline-drawer-toggle inline-drawer-header">
    <b>随机事件池（Demo）</b>
    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
  </div>

  <div class="inline-drawer-content">
    <div class="revt-row revt-toolbar">
      <label class="revt-switch-wrap">
        <input id="revt-enabled" type="checkbox" checked />
        <span>启用事件注入</span>
      </label>
      <button id="revt-refresh" class="menu_button">刷新</button>
      <button id="revt-generate" class="menu_button">空池补充</button>
      <span id="revt-chat-hint" class="revt-chat-hint">chat: --</span>
    </div>

    <div class="revt-row">
      <b>API 设置</b>
      <div class="revt-grid">
        <label for="revt-api-provider">提供商</label>
        <select id="revt-api-provider">
          <option value="sillytavern_preset">SillyTavern 预设</option>
          <option value="direct_openai">直接 OpenAI 兼容</option>
        </select>

        <label for="revt-api-url">API URL</label>
        <input id="revt-api-url" type="text" placeholder="https://.../v1/chat/completions" />

        <label for="revt-api-key">API Key</label>
        <input id="revt-api-key" type="password" placeholder="sk-..." />

        <label for="revt-model-name">模型名</label>
        <input id="revt-model-name" type="text" placeholder="gpt-4o-mini / gemini..." />
      </div>
      <div class="revt-actions">
        <button id="revt-save-api" class="menu_button">保存API设置</button>
        <button id="revt-test-api" class="menu_button">测试连接</button>
      </div>
      <div class="revt-muted">预设模式将复用你当前酒馆已配置模型；直连模式使用上面的 URL/Key/Model。</div>
    </div>

    <div class="revt-row">
      <label for="revt-preference"><b>玩家偏好（高优先级）</b></label>
      <textarea id="revt-preference" rows="3" placeholder="输入偏好/禁区/风格要求"></textarea>
      <div class="revt-actions">
        <button id="revt-save-pref" class="menu_button">保存偏好</button>
      </div>
    </div>

    <div class="revt-row">
      <b>当前事件池</b>
      <div id="revt-empty" class="revt-muted">暂无事件</div>
      <div id="revt-list"></div>
    </div>

    <div class="revt-row">
      <b>自动清理日志（最近）</b>
      <div id="revt-log-list" class="revt-log-box"></div>
    </div>

    <hr class="sysHR" />
    <div class="revt-muted">
      规则：按聊天隔离；空池才生成3-5条；自动清理失效/已发生；用户可手动删除。
    </div>
  </div>
</div>
